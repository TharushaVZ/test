<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Green & Red Greeting</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #0a1f13, #040d08);
            font-family: 'Segoe UI', sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px;
            width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #ff4d4d;
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
        }

        p {
            color: #8da396;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(141, 163, 150, 0.3);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: #ff4d4d;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff4d4d, #b30000);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(179, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(179, 0, 0, 0.4);
        }

        .btn-back {
            background: none;
            border: none;
            color: #8da396;
            cursor: pointer;
            margin-top: 25px;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .btn-back:hover {
            color: #ff4d4d;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div id="welcome-screen" class="card">
        <h1>Welcome</h1>
        <p>Please enter your name to receive a greeting.</p>
        <input type="text" id="nameInput" placeholder="Enter your name">
        <button class="btn-primary" onclick="showGreeting()">Get Greeting</button>
    </div>

    <div id="greeting-screen" class="card hidden">
        <h1 id="greetingText">Hello!</h1>
        <button class="btn-back" onclick="goBack()">Go Back</button>
    </div>

    <script>
        function showGreeting() {
            const name = document.getElementById('nameInput').value;
            if (name.trim() !== "") {
                document.getElementById('greetingText').innerText = `Hello, ${name}!`;
                document.getElementById('welcome-screen').classList.add('hidden');
                document.getElementById('greeting-screen').classList.remove('hidden');
            }
        }

        function goBack() {
            document.getElementById('welcome-screen').classList.remove('hidden');
            document.getElementById('greeting-screen').classList.add('hidden');
            document.getElementById('nameInput').value = "";
        }
    </script>
</body>
</html>
